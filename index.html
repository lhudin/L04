<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>L04 MPC Station Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Roboto Mono', monospace;
    background-color: #ffffff;
    color: #111827;
    margin: 40px;
    font-size: 14px;
}

h1 {
    font-size: 22px;
    margin-bottom: 5px;
}

.small {
    color: #6b7280;
    margin-bottom: 20px;
}

.box {
    border: 1px solid #e5e7eb;
    padding: 12px;
    background: #f9fafb;
    margin-top: 10px;
}

h2 {
    margin-top: 30px;
    font-size: 16px;
    border-bottom: 1px solid #e5e7eb;
    padding-bottom: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    border: 1px solid #e5e7eb;
    padding: 8px;
    text-align: left;
}

th {
    background: #f3f4f6;
}

a {
    color: #059669;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

.status {
    color: #059669;
}
</style>
</head>

<body>

<h1>L04 – MPC Astrometric Station Dashboard</h1>
<div class="small">Auto-updating observation log (CSV-based)</div>

<h2>Station Summary</h2>
<div class="box">
Observatory Code: L04<br>
Location: Romania (Cluj area)<br>
Status: <span class="status">Active</span>
</div>

<h2>Observation Log</h2>

<div class="box">
<table id="logTable">
    <thead>
        <tr>
            <th>Date</th>
            <th>Object</th>
            <th>Magnitude</th>
            <th>Notes</th>
            <th>MPEC</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>
</div>

<script>
async function loadCSV() {
    const response = await fetch('logs.csv');
    const data = await response.text();

    const rows = data.trim().split('\n').slice(1);
    const tbody = document.querySelector("#logTable tbody");

    rows.forEach(row => {
        const cols = row.split(',');

        const tr = document.createElement('tr');

        // date
        let td1 = document.createElement('td');
        td1.textContent = cols[0];
        tr.appendChild(td1);

        // object
        let td2 = document.createElement('td');
        td2.textContent = cols[1];
        tr.appendChild(td2);

        // mag
        let td3 = document.createElement('td');
        td3.textContent = cols[3];
        tr.appendChild(td3);

        // notes
        let td4 = document.createElement('td');
        td4.textContent = cols[2];
        tr.appendChild(td4);

        // MPEC link
        let td5 = document.createElement('td');
        let a = document.createElement('a');
        a.href = cols[4];
        a.target = "_blank";
        a.textContent = "MPEC";
        td5.appendChild(a);
        tr.appendChild(td5);

        tbody.appendChild(tr);
    });
}

loadCSV();
</script>

</body>
</html>
